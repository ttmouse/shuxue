<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2358CC02' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2'/><path d='M18 14v4'/><path d='M10 14v4'/><path d='M14 14v4'/><path d='M14 4v6'/><path d='M10 4v6'/><path d='M12 12v.01'/></svg>">
<title>数学思维训练</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ============================================================
     视图：首页（模式广场）
     ============================================================ -->
<div id="view-home" class="view view-home active">
  <div class="home-header">
    <div class="home-logo">
      <div class="home-logo-icon"><i data-lucide="brain" style="width:56px;height:56px;color:var(--primary);stroke-width:1.5;"></i></div>
      <h1>数学思维训练</h1>
      <p class="home-subtitle">选择一种挑战模式</p>
    </div>
  </div>

  <div class="mode-grid" id="mode-grid">
    <!-- 由 framework.js 动态渲染 -->
  </div>

  <div class="home-footer">
    <span class="footer-text">每天 5 分钟，让思维更灵活</span>
  </div>

  <div class="home-wb-bar" id="home-wb-bar" onclick="showGlobalWrongBook()">
    <i data-lucide="book-open" style="width:18px;height:18px;color:var(--text-secondary)"></i>
    <span>查看错题本</span>
    <span class="home-wb-count" id="home-wb-count">0</span>
  </div>
</div>

<!-- ============================================================
     视图：模式容器
     ============================================================ -->
<div id="view-mode" class="view view-mode" style="display:none;">
  <div class="mode-top-bar">
    <button class="top-back-btn" onclick="Framework.goHome()" aria-label="返回">
      <i data-lucide="arrow-left"></i>
    </button>
    <span class="top-title" id="mode-title">模式名称</span>
    <div style="width:44px;"></div>
  </div>
  <div class="mode-scroll" id="mode-content">
    <!-- 由模式 render() 填充 -->
  </div>
</div>

<!-- ============================================================
     旧版页面（兼容传统口算模式）
     ============================================================ -->

<!-- 首页 -->
<div id="page-home" class="page page-old">
  <div class="old-top-bar">
    <button class="old-back-btn" onclick="Framework.goHome()"><i data-lucide="arrow-left"></i></button>
    <span class="old-top-title">传统口算</span>
    <div style="width:44px;"></div>
  </div>
  <div class="home-container">
    <div class="logo-area">
      <div class="logo-icon"><i data-lucide="calculator" style="width:52px;height:52px;color:var(--primary);stroke-width:1.5;"></i></div>
      <h1>数学口算大闯关</h1>
      <p class="subtitle">小学口算 · 知识点专项练习</p>
    </div>
    <div class="home-buttons">
      <button class="btn btn-primary btn-large" onclick="showPage('page-settings')">开始练习</button>
      <button class="btn btn-secondary btn-large" onclick="showWrongBook()">错题本</button>
    </div>
    <div class="home-stats" id="home-stats"></div>
    <div class="home-day-stats" id="home-day-stats"></div>
  </div>
</div>

<!-- 设置页 -->
<div id="page-settings" class="page page-old">
  <div class="old-top-bar">
    <button class="old-back-btn" onclick="Framework.goHome()"><i data-lucide="arrow-left"></i></button>
    <span class="old-top-title">练习设置</span>
    <select class="grade-select" id="grade-select" onchange="switchGrade(this.value)">
      <option value="1年级">1年级</option>
      <option value="2年级">2年级</option>
      <option value="3年级" selected>3年级</option>
      <option value="4年级">4年级</option>
      <option value="5年级">5年级</option>
      <option value="6年级">6年级</option>
    </select>
  </div>
  <div id="topic-select"></div>
</div>

<!-- 答题页 -->
<div id="page-practice" class="page page-old">
  <div class="mode-top-bar">
    <button class="top-back-btn" onclick="Framework.goHome()"><i data-lucide="arrow-left"></i></button>
    <span class="top-title">传统口算</span>
    <div style="width:44px;"></div>
  </div>
  <div class="c-play" id="c-play">
    <div class="c-play-progress">
      <div class="c-play-pb-track">
        <div class="c-play-pb-fill" id="c-progress" style="width:0%"></div>
      </div>
      <span class="c-play-step" id="c-step">1/20</span>
      <div class="c-play-score">
        <span class="c-cor"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;color:var(--primary)"><polyline points="20 6 9 17 4 12"/></svg> <span id="c-correct">0</span></span>
        <span class="c-str"><span id="c-wrong">0</span></span>
      </div>
    </div>

    <div class="c-play-core">
      <div class="c-play-law" id="c-law">第 1 题 · 加减法</div>
      <div class="c-play-q" id="c-question">123 + 456 = ?</div>
      <div class="c-play-input" id="c-input-wrap">
        <span class="c-play-input-text" id="c-input-text"></span>
        <span class="c-play-cursor" id="c-cursor">|</span>
      </div>
    </div>

    <div class="c-play-keys" id="c-keys">
      <div class="c-pr">
        <button class="c-key" data-v="7">7</button>
        <button class="c-key" data-v="8">8</button>
        <button class="c-key" data-v="9">9</button>
        <button class="c-key c-key-bk" data-v="bk">⌫</button>
      </div>
      <div class="c-pr">
        <button class="c-key" data-v="4">4</button>
        <button class="c-key" data-v="5">5</button>
        <button class="c-key" data-v="6">6</button>
        <button class="c-key c-key-op" data-v="−">−</button>
      </div>
      <div class="c-pr">
        <button class="c-key" data-v="1">1</button>
        <button class="c-key" data-v="2">2</button>
        <button class="c-key" data-v="3">3</button>
        <button class="c-key c-key-cl" data-v="cl">清空</button>
      </div>
      <div class="c-pr">
        <button class="c-key" data-v=".">.</button>
        <button class="c-key" data-v="0">0</button>
        <button class="c-key" data-v="/">/</button>
        <button class="c-key c-key-go" id="c-submit">确定</button>
      </div>
      <div class="c-pr c-pr-cmp" style="display:none">
        <button class="c-key c-key-cmp" data-v=">">&gt;</button>
        <button class="c-key c-key-cmp" data-v="<">&lt;</button>
        <button class="c-key c-key-cmp" data-v="=">=</button>
      </div>
    </div>

    <div class="c-fb" id="c-fb" style="display:none">
      <div class="c-fb-icon" id="c-fb-icon"></div>
      <div class="c-fb-title" id="c-fb-title"></div>
      <div class="c-fb-law" id="c-fb-law"></div>
      <div class="c-fb-bd" id="c-fb-bd"></div>
      <button class="c-fb-next" id="c-fb-next" onclick="nextQuestion()">下一题</button>
    </div>

    <div class="c-result" id="c-result" style="display:none">
      <div class="c-result-icon">🏆</div>
      <div class="c-result-title" id="c-result-title">完成！</div>
      <div class="c-result-ring" id="c-result-ring">
        <svg viewBox="0 0 36 36">
          <defs>
            <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="var(--primary)"/>
              <stop offset="100%" stop-color="#7FDD38"/>
            </linearGradient>
          </defs>
          <circle class="c-result-ring-bg" cx="18" cy="18" r="15.9"/>
          <circle class="c-result-ring-fill" cx="18" cy="18" r="15.9"
            stroke-dasharray="100" stroke-dashoffset="100" id="c-ring-fill"/>
        </svg>
        <div class="c-result-ring-text">
          <div class="c-result-ring-pct" id="c-ring-pct">0%</div>
          <div class="c-result-ring-label">正确率</div>
        </div>
      </div>
      <div class="c-result-stats" id="c-result-stats"></div>
      <div class="c-result-actions">
        <button class="c-result-btn c-result-btn-primary" id="c-restart" onclick="showPage('page-settings')">再来一轮</button>
        <button class="c-result-btn c-result-btn-ghost" id="c-view-wb" onclick="showWrongBook()">查看错题本</button>
      </div>
    </div>
  </div>
</div>

<!-- 结果页 -->
<div id="page-result" class="page page-old">
  <div class="old-top-bar">
    <button class="old-back-btn" onclick="Framework.goHome()"><i data-lucide="arrow-left"></i></button>
    <span class="old-top-title">传统口算</span>
    <div style="width:44px;"></div>
  </div>
  <div class="result-container">
    <div class="result-icon" id="result-icon">🏆</div>
    <h2 id="result-title">太棒了！</h2>
    <div class="result-score">
      <div class="result-number" id="result-correct">0</div>
      <div class="result-label">正确</div>
    </div>
    <div class="result-detail">
      <div class="result-item"><span>总题数</span><span id="result-total">0</span></div>
      <div class="result-item"><span>正确率</span><span id="result-rate">0%</span></div>
      <div class="result-item"><span>用时</span><span id="result-time">0 秒</span></div>
      <div class="result-item" id="result-wrong-item" style="display:none;"><span>错题数</span><span id="result-wrong-count">0</span></div>
    </div>
    <div class="result-buttons">
      <button class="btn btn-primary" onclick="showPage('page-settings')">再来一轮</button>
      <button class="btn btn-secondary" onclick="showWrongBook()">查看错题本</button>
    </div>
  </div>
</div>

<!-- 错题本 -->
<div id="page-wrongbook" class="page page-old">
  <div class="old-top-bar">
    <button class="old-back-btn" onclick="Framework.goHome()"><i data-lucide="arrow-left"></i></button>
    <span class="old-top-title">错题本</span>
    <div style="width:44px;"></div>
  </div>
  <div class="wrongbook-container">
    <div class="wrongbook-header">
      <h2>错题本</h2>
      <button class="btn btn-sm btn-danger" onclick="clearWrongBook()">清空错题本</button>
    </div>
    <div class="wrongbook-filters" id="wrongbook-filters">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="add-sub">加减法</button>
      <button class="filter-btn" data-filter="multiplication">乘法</button>
      <button class="filter-btn" data-filter="division">除法</button>
      <button class="filter-btn" data-filter="mixed">混合</button>
      <button class="filter-btn" data-filter="decimal">小数</button>
      <button class="filter-btn" data-filter="fraction">分数</button>
      <button class="filter-btn" data-filter="percent">百分数</button>
      <button class="filter-btn" data-filter="unit-convert">单位换算</button>
      <button class="filter-btn" data-filter="clever">运算定律巧算</button>
    </div>
    <div class="wrongbook-stats" id="wrongbook-stats"></div>
    <table class="wb-table">
      <thead>
        <tr>
          <th>题目</th>
          <th>错次</th>
          <th>正确答案</th>
          <th>你的答案</th>
        </tr>
      </thead>
      <tbody id="wrongbook-list"></tbody>
    </table>
    <div class="wrongbook-actions">
      <button class="btn btn-primary" onclick="retryWrongQuestions()">重练错题</button>
    </div>
  </div>
</div>

<!-- 错题重练页 -->
<div id="page-retry" class="page page-old">
  <div class="mode-top-bar">
    <button class="top-back-btn" onclick="quitRetry()"><i data-lucide="arrow-left"></i></button>
    <span class="top-title">错题重练</span>
    <div style="width:44px;"></div>
  </div>
  <div class="c-play" id="retry-play">
    <div class="c-play-progress">
      <div class="c-play-pb-track">
        <div class="c-play-pb-fill" id="retry-progress-fill" style="width:0%"></div>
      </div>
      <span class="c-play-step" id="retry-step">1/20</span>
      <div class="c-play-score">
        <span class="c-cor"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;color:var(--primary)"><polyline points="20 6 9 17 4 12"/></svg> <span id="retry-correct">0</span></span>
        <span class="c-str"><span id="retry-wrong">0</span></span>
      </div>
    </div>

    <div class="c-play-core">
      <div class="c-play-law" id="retry-law">错题重练</div>
      <div class="c-play-q" id="retry-question-text">?</div>
      <div class="c-play-input" id="retry-input-wrap">
        <span class="c-play-input-text" id="retry-input-text"></span>
        <span class="c-play-cursor" id="retry-cursor">|</span>
      </div>
    </div>

    <div class="c-play-keys" id="retry-keys">
      <div class="c-pr">
        <button class="c-key" data-v="7">7</button>
        <button class="c-key" data-v="8">8</button>
        <button class="c-key" data-v="9">9</button>
        <button class="c-key c-key-bk" data-v="bk">⌫</button>
      </div>
      <div class="c-pr">
        <button class="c-key" data-v="4">4</button>
        <button class="c-key" data-v="5">5</button>
        <button class="c-key" data-v="6">6</button>
        <button class="c-key c-key-op" data-v="−">−</button>
      </div>
      <div class="c-pr">
        <button class="c-key" data-v="1">1</button>
        <button class="c-key" data-v="2">2</button>
        <button class="c-key" data-v="3">3</button>
        <button class="c-key c-key-cl" data-v="cl">清空</button>
      </div>
      <div class="c-pr">
        <button class="c-key" data-v=".">.</button>
        <button class="c-key" data-v="0">0</button>
        <button class="c-key" data-v="/">/</button>
        <button class="c-key c-key-go" id="c-submit">确定</button>
      </div>
      <div class="c-pr c-pr-cmp" style="display:none">
        <button class="c-key c-key-cmp" data-v=">">&gt;</button>
        <button class="c-key c-key-cmp" data-v="<">&lt;</button>
        <button class="c-key c-key-cmp" data-v="=">=</button>
      </div>
    </div>

    <div class="c-fb" id="retry-fb" style="display:none">
      <div class="c-fb-icon" id="retry-fb-icon"></div>
      <div class="c-fb-title" id="retry-fb-title"></div>
      <div class="c-fb-law" id="retry-fb-law"></div>
      <div class="c-fb-bd" id="retry-fb-detail"></div>
      <button class="c-fb-next" id="retry-fb-next">下一题</button>
    </div>
  </div>
</div>

<!-- ============================================================
     Scripts
     ============================================================ -->
<script src="js/lucide.js"></script>
<script src="js/knowledge.js?v=2"></script>
<script src="js/questions.js?v=4"></script>
<script src="js/wrongbook.js"></script>
<script src="js/stats.js"></script>
<script src="js/sound.js"></script>
<script src="js/framework.js"></script>
<script src="js/modes/game24.js?v=2"></script>
<script src="js/modes/clever.js?v=1"></script>
<script src="js/app.js?v=5"></script>
<script>
// ============================================================
// 框架初始化
// ============================================================

// 注入公用服务
Framework.sound = Sound;
Framework.stats = Stats;

// 模式卡片数据（用于渲染首页 + 注册到框架）
// 模式 JS 文件通过 Framework.provideRender() 补充 render 函数
const MODE_CARDS = [
  { id: 'game24',        name: '24 点挑战',     icon: 'dices',       desc: '用 4 个数字加减乘除凑出 24',        color: 'var(--primary)',  tag: '新',    tagColor: '#58CC02' },
  { id: 'clever',        name: '运算定律巧算',   icon: 'zap',         desc: '发现数字的秘密，巧用运算定律',       color: 'var(--orange)',   tag: '新', tagColor: '#ff9600' },
  { id: 'card-draw',     name: '抽卡凑数',       icon: 'sparkles',    desc: '用随机数字组合达成目标',             color: 'var(--purple)',   tag: '即将', tagColor: '#c054f7' },
  { id: 'practice',      name: '传统口算',       icon: 'calculator',  desc: '知识点专项练习，巩固计算基础',        color: 'var(--blue)',     tag: null,   tagColor: null },
];

// 注册所有模式到框架（有独立 JS 文件的模式自行注册，这里跳过）
const SELF_REGISTERED = ['game24', 'clever'];
MODE_CARDS.forEach(m => {
  if (!SELF_REGISTERED.includes(m.id)) {
    Framework.register(m);
  }
});

// 渲染模式卡片
function renderModeGrid() {
  const grid = document.getElementById('mode-grid');
  grid.innerHTML = MODE_CARDS.map((m, i) => `
    <div class="mode-card" onclick="Framework.navigate('${m.id}')" style="animation-delay:${i * 80}ms">
      <div class="mode-card-icon" style="background:${m.color}20;color:${m.color}">
        <i data-lucide="${m.icon}"></i>
      </div>
      <div class="mode-card-body">
        <div class="mode-card-title">${m.name}</div>
        <div class="mode-card-desc">${m.desc}</div>
        ${m.tag ? `<div class="mode-card-badges"><span class="mode-badge" style="background:${m.tagColor}20;color:${m.tagColor}">${m.tag}</span></div>` : ''}
      </div>
      <div class="mode-card-arrow">›</div>
    </div>
  `).join('');

  // 渲染 Lucide 图标
  if (typeof lucide !== 'undefined') {
    lucide.createIcons();
  }
}

renderModeGrid();

// 加载完毕初始化
document.addEventListener('DOMContentLoaded', () => {
  if (typeof lucide !== 'undefined') {
    lucide.createIcons();
  }
  // 首页统计
  if (typeof updateHomeStats === 'function') {
    updateHomeStats();
  }
  // 错题本计数
  if (typeof updateWbBadge === 'function') updateWbBadge();
});
</script>
</body>
</html>
